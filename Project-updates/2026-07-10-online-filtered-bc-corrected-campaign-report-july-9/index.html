<style>
  :root {
    --background: #ffffff; --surface: #f6f8f9; --text: #14181b;
    --muted: #52606d; --border: #cbd2d8; --accent: #215b8f; --chip: #e8eef3;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --background: #111416; --surface: #191e22; --text: #edf1f4;
      --muted: #aeb8c2; --border: #3b4650; --accent: #8fc5ee; --chip: #283640;
    }
  }
  :root[data-theme="dark"] {
      --background: #111416; --surface: #191e22; --text: #edf1f4;
      --muted: #aeb8c2; --border: #3b4650; --accent: #8fc5ee; --chip: #283640;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--background); color: var(--text);
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .lock {
    width: 100%; max-width: 380px; padding: 28px 26px 24px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  }
  h1 { margin: 0 0 6px; font-size: 1.15rem; }
  p { margin: 0 0 18px; color: var(--muted); font-size: 0.92rem; }
  form { display: flex; gap: 8px; }
  input {
    flex: 1; min-width: 0; padding: 9px 11px; font: inherit; font-size: 0.95rem;
    color: var(--text); background: var(--background);
    border: 1px solid var(--border); border-radius: 7px;
  }
  input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button {
    padding: 9px 16px; font: inherit; font-size: 0.95rem; cursor: pointer;
    color: var(--background); background: var(--accent);
    border: 1px solid var(--accent); border-radius: 7px;
  }
  .msg { margin: 14px 0 0; font-size: 0.88rem; color: #b4443c; }
  .msg[hidden] { display: none; }
  .working { color: var(--muted); }
</style>
<script>try{var t=localStorage.getItem('theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t}catch(e){}</script>

<script>
(function () {
  var P = JSON.parse(document.getElementById('payload').textContent);
  var CACHE = 'pu_key';
  var DATA_EXT = /\.(json|csv|md|txt|py)$/i;
  var form = document.getElementById('unlock-form');
  var input = document.getElementById('pw');
  var msg = document.getElementById('msg');
  var key = null;

  function bytes(b64) {
    var raw = atob(b64), out = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
    return out;
  }
  function toB64(buf) {
    var u8 = new Uint8Array(buf), s = '';
    for (var i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]);
    return btoa(s);
  }
  function say(text, working) {
    msg.textContent = text;
    msg.className = working ? 'msg working' : 'msg';
    msg.hidden = !text;
  }

  if (!window.crypto || !crypto.subtle) {
    say('This browser cannot decrypt the page. Open it over https, not as a local file.');
    form.hidden = true;
    return;
  }

  function keyFromBits(bits) {
    return crypto.subtle.importKey('raw', bits, 'AES-GCM', false, ['decrypt']);
  }
  function keyFromPassword(password) {
    return crypto.subtle
      .importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits'])
      .then(function (base) {
        return crypto.subtle.deriveBits(
          { name: 'PBKDF2', salt: bytes(P.salt), iterations: P.iters, hash: 'SHA-256' },
          base, 256
        );
      });
  }
  function decrypt(iv, ct) {
    return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
  }

  // Evidence files ship encrypted too, so a click has to fetch and decrypt them.
  function interceptDataLinks() {
    document.addEventListener('click', function (ev) {
      var anchor = ev.target && ev.target.closest ? ev.target.closest('a[href]') : null;
      if (!anchor) return;
      var href = anchor.getAttribute('href');
      if (!href || /^([a-z]+:|#)/i.test(href)) return;
      if (!DATA_EXT.test(href.split(/[?#]/)[0])) return;
      ev.preventDefault();
      fetch(href + '.enc')
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
        .then(function (buf) {
          var u8 = new Uint8Array(buf);
          return decrypt(u8.slice(0, 12), u8.slice(12));
        })
        .then(function (plain) {
          var url = URL.createObjectURL(new Blob([plain]));
          var dl = document.createElement('a');
          dl.href = url;
          dl.download = href.split('/').pop();
          document.body.appendChild(dl);
          dl.click();
          dl.remove();
          setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
        })
        .catch(function () { window.alert('Could not open ' + href); });
    });
  }

  function render(html) {
    document.open();
    document.write(html);
    document.close();
    interceptDataLinks();
  }

  function unlock(bits, fromCache) {
    return keyFromBits(bits)
      .then(function (k) { key = k; return decrypt(bytes(P.iv), bytes(P.ct)); })
      .then(function (plain) {
        try { sessionStorage.setItem(CACHE, toB64(bits)); } catch (e) {}
        render(new TextDecoder().decode(plain));
      })
      .catch(function () {
        key = null;
        try { sessionStorage.removeItem(CACHE); } catch (e) {}
        if (!fromCache) say('Wrong password.');
        input.value = '';
        input.focus();
      });
  }

  form.addEventListener('submit', function (ev) {
    ev.preventDefault();
    var password = input.value;
    if (!password) return;
    say('Unlocking…', true);
    keyFromPassword(password).then(function (bits) { return unlock(bits, false); });
  });

  var cached = null;
  try { cached = sessionStorage.getItem(CACHE); } catch (e) {}
  if (cached) unlock(bytes(cached), true);
})();
</script>

</body>
